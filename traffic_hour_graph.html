<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Traffic AI v2</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }

    #prediction {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #alertBox {
      font-size: 18px;
      margin-bottom: 15px;
      font-weight: bold;
    }

    canvas {
      background: white;
      padding: 10px;
      border-radius: 10px;
    }

    a {
      text-decoration: none;
      color: blue;
    }
  </style>
</head>
<body>

<h2>🚦 Smart Traffic AI Dashboard v2</h2>

<a href="/dashboard">⬅ Back to Map</a>

<div id="prediction"></div>
<div id="alertBox"></div>

<canvas id="chart"></canvas>

<script>
/* -----------------------------
   📊 BASE TRAFFIC DATA
----------------------------- */
let data = [
  10, 15, 20, 30, 40, 60, 80, 90,
  85, 70, 60, 55, 50, 60,
  70, 80, 90, 95, 85, 70,
  60, 50, 40, 30
];

/* -----------------------------
   📈 CHART
----------------------------- */
const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
  type: "line",
  data: {
    labels: Array.from({ length: 24 }, (_, i) => i + ":00"),
    datasets: [{
      label: "Live Traffic Level",
      data: data,
      borderWidth: 2,
      fill: true
    }]
  }
});

/* -----------------------------
   🧠 AI-STYLE PREDICTION ENGINE
----------------------------- */

function getTimeScore(hour) {
  if ((hour >= 7 && hour <= 10) || (hour >= 17 && hour <= 21)) {
    return 85;
  } 
  if (hour >= 11 && hour <= 16) {
    return 50;
  }
  return 25;
}

function getDataScore(data) {
  return data.reduce((a, b) => a + b, 0) / data.length;
}

function predict(hour, data) {
  let score = (getTimeScore(hour) * 0.6) + (getDataScore(data) * 0.4);

  if (score > 75) return "HIGH 🔴";
  if (score > 45) return "MEDIUM 🟡";
  return "LOW 🟢";
}

/* -----------------------------
   ⚠ ALERT SYSTEM
----------------------------- */
function showAlert(status) {
  let box = document.getElementById("alertBox");

  if (status.includes("HIGH")) {
    box.innerHTML = "⚠ Heavy Traffic Detected - Avoid Route";
    box.style.color = "red";
  } 
  else if (status.includes("MEDIUM")) {
    box.innerHTML = "⚡ Moderate Traffic - Slow Down";
    box.style.color = "orange";
  } 
  else {
    box.innerHTML = "🟢 Smooth Traffic Flow";
    box.style.color = "green";
  }
}

/* -----------------------------
   🔄 LIVE SIMULATION ENGINE
----------------------------- */
function updateSystem() {

  // 🎲 simulate live traffic change
  data = data.map(v => {
    let change = Math.random() * 10 - 5;
    return Math.max(0, Math.min(100, v + change));
  });

  chart.data.datasets[0].data = data;
  chart.update();

  let hour = new Date().getHours();

  let result = predict(hour, data);

  document.getElementById("prediction").innerText =
    "Live Prediction: " + result;

  showAlert(result);
}

/* -----------------------------
   ⏱ AUTO UPDATE (REAL-TIME FEEL)
----------------------------- */
updateSystem();
setInterval(updateSystem, 5000);

</script>

</body>
</html>
